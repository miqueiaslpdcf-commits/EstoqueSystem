<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>📋 Painel Geral</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  padding:20px;
  font-family:system-ui,Arial;
  background:#0f172a;
  color:white;
}

h1{
  text-align:center;
  margin-bottom:25px;
  font-size:clamp(28px,5vw,45px);
}

/* MENSAGEM */
#mensagemMotivacional{
  background:#1e293b;
  border:2px solid #38bdf8;
  padding:18px;
  border-radius:18px;
  margin:0 auto 25px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  max-width:900px;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
  animation:aparecer 0.4s ease;
}

@keyframes aparecer{
  from{
    opacity:0;
    transform:translateY(-10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:22px;
  padding:25px 15px;
  text-decoration:none;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:180px;
  transition:0.2s;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.card:active{
  transform:scale(0.96);
}

.card:hover{
  background:#334155;
}

/* ÍCONE */
.icone{
  font-size:55px;
  margin-bottom:15px;
}

/* TÍTULO */
.titulo{
  font-size:22px;
  font-weight:bold;
  text-align:center;
}

/* SUB */
.sub{
  margin-top:8px;
  font-size:13px;
  opacity:0.7;
  text-align:center;
}

/* CORES */
.bomboniere{
  border:3px solid #ec4899;
}

.bebidas{
  border:3px solid #3b82f6;
}

.cafe{
  border:3px solid #f59e0b;
}

.cozinha{
  border:3px solid #22c55e;
}

.estoque{
  border:3px solid #6366f1;
}

.estoque-seco{
  border:3px solid #f97316;
}

/* DESKTOP */
@media(min-width:768px){

  body{
    padding:35px;
  }

  .grid{
    grid-template-columns:repeat(3,1fr);
  }

}
</style>
</head>

<body>

</body>
</html>
