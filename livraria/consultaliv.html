<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Consultar Livro</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #ece6da, #f7f3ea);
  margin: 0;
  padding: 30px;
  color: #2b2b2b;
}

/* painel principal */
.container {
  max-width: 900px;
  margin: auto;
  background: #fffdf7;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  border: 1px solid #e7dcc6;
}

/* título estilo sistema */
h2 {
  text-align: center;
  color: #2a3b4c;
  margin-bottom: 25px;
  font-size: 22px;
  letter-spacing: 0.5px;
}

/* input moderno estilo search global */
input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid #d6cbb3;
  font-size: 15px;
  outline: none;
  background: #fff;
  transition: 0.2s;
}

input:focus {
  border-color: #3b5b7a;
  box-shadow: 0 0 0 3px rgba(59,91,122,0.15);
}

/* botão moderno */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #3b5b7a;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #2f4a63;
  transform: translateY(-1px);
}

/* sugestões dropdown */
#sugestoes {
  background: white;
  border: 1px solid #e7dcc6;
  position: absolute;
  width: 100%;
  z-index: 10;
  border-radius: 0 0 12px 12px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

#sugestoes div {
  padding: 12px;
  cursor: pointer;
  transition: 0.15s;
  border-bottom: 1px solid #f1eadc;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

#sugestoes div:hover {
  background: #f7f1e5;
}

/* ===== CATÁLOGO (NÍVEL 2 VISUAL) ===== */

#resultado {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
}

/* card do livro */
.item {
  background: white;
  border-radius: 14px;
  border: 1px solid #eee3cc;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  padding: 14px;
  transition: 0.2s;
  position: relative;
}

.item:hover {
  transform: translateY(-4px);
}

/* título do livro */
.item b {
  display: block;
  font-size: 15px;
  margin-bottom: 8px;
  color: #2a3b4c;
}

/* linha de info */
.item .info {
  font-size: 13px;
  margin-top: 4px;
  color: #555;
}

/* badge estoque estilo etiqueta */
.badge {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 5px 8px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  color: white;
}

.badge.ok {
  background: #2e7d32;
}

.badge.bad {
  background: #c62828;
}

/* status */
.ok {
  color: #2e7d32;
  font-weight: 600;
}

.bad {
  color: #c62828;
  font-weight: 600;
}

/* cache label */
.cache {
  font-size: 12px;
  color: #8a7d66;
  margin-bottom: 10px;
  display: block;
}

</style>
</head>

<body>

<div class="container">
  <h2>🔎 Consultar Livro</h2>
  <div style="position:relative;">
<input type="text" id="busca" placeholder="Digite EAN ou título" oninput="handleInput()" autocomplete="off">
  <div id="sugestoes" style="background:white;border:1px solid #ddd;position:absolute;width:100%;z-index:10;"></div>
  </div>
  <button onclick="consultar()">Buscar</button>

  <div id="resultado"></div>
</div>

<script>

let timerInput;
let timerSuggest;
let requestId = 0;


const API_URL = "https://script.google.com/macros/s/AKfycbxVAOrp6lLFJfPpgOkrfwNS6UGXNFDr-zWql5bIeMjNHRJ-lQvKUgWUNmuSFs3bZOUyow/exec";

// ⚡ CACHE simples no navegador
const cache = JSON.parse(localStorage.getItem("cacheLivros") || "{}");

async function consultar() {
  const q = document.getElementById("busca").value.toLowerCase().trim();
  const res = document.getElementById("resultado");

  if (!q) return;

  // ⚡ 1. verifica cache primeiro
  if (cache[q]) {
    render(cache[q], true);
    return;
  }

  res.innerHTML = "Buscando...";

  try {
    const response = await fetch(`${API_URL}?q=${encodeURIComponent(q)}`);
    const data = await response.json();

    // salva no cache
    cache[q] = data.resultados;
    localStorage.setItem("cacheLivros", JSON.stringify(cache));

    render(data.resultados, false);

  } catch (err) {
    res.innerHTML = "Erro na consulta";
  }
}

function render(lista, fromCache) {
  const res = document.getElementById("resultado");

  if (!lista || lista.length === 0) {
    res.innerHTML = "Nenhum livro encontrado";
    return;
  }

  res.innerHTML = `
    <div style="grid-column:1/-1;">
      <span class="cache">
        ${fromCache ? "⚡ cache local" : "🌐 consulta ao catálogo"}
      </span>
    </div>

    ${lista.map(l => `
      <div class="item">
        
        <div class="badge ${l.disponivel ? 'ok' : 'bad'}">
          ${l.estoque}
        </div>

        <b>${l.titulo}</b>

        <div class="info">EAN: ${l.ean}</div>

        <div class="info">
          Status: 
          <span class="${l.disponivel ? 'ok' : 'bad'}">
            ${l.disponivel ? "Disponível" : "Indisponível"}
          </span>
        </div>

      </div>
    `).join("")}
  `;
}
async function autocomplete() {
  const q = document.getElementById("busca").value.trim();
  const box = document.getElementById("sugestoes");

  clearTimeout(timerSuggest);

  if (!q) {
    box.innerHTML = "";
    return;
  }

  const currentRequest = ++requestId;

  timerSuggest = setTimeout(async () => {
    try {
      const res = await fetch(`${API_URL}?q=${encodeURIComponent(q)}&type=suggest`);
      const data = await res.json();

      // 🔥 ignora resposta antiga
      if (currentRequest !== requestId) return;

      if (!data.sugestoes || data.sugestoes.length === 0) {
        box.innerHTML = "";
        return;
      }

      box.innerHTML = data.sugestoes.map(item => `
        <div onclick="selecionarSugestao('${item.titulo.replace(/'/g, "\\'")}')">
          📘 ${item.titulo}
        </div>
      `).join("");

    } catch (err) {
      console.log(err);
    }
  }, 80);
}

function selecionarSugestao(titulo) {
  document.getElementById("busca").value = titulo;
  document.getElementById("sugestoes").innerHTML = "";

  consultar(); // usa sua busca já existente
}

function handleInput() {
  const q = document.getElementById("busca").value.trim();

  clearTimeout(timerInput);

  const isEAN = /^[0-9]{8,13}$/.test(q);

  if (isEAN && (q.length === 13 || q.length === 12)) {
    consultar();
    return;
  }

  timerInput = setTimeout(() => {
    if (q.length >= 2) {
      autocomplete();
    }
  }, 200);
}

</script>

</body>
</html>
