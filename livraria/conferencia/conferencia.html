<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conferência de Entrada de Notas</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
    color:#333;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    margin-bottom:20px;
    background:#1f4e79;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.btn-menu{
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,.15);
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    transition:.2s;
}

.btn-menu:hover{
    background:rgba(255,255,255,.3);
}

h2{
    margin:0;
    color:white;
    font-size:24px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    margin-bottom:20px;
    border-left:5px solid #1f4e79;
}


.topo-dashboard{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    padding:20px;
    background:#1f4e79;
    color:white;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.topo-dashboard h1{
    margin:0;
    font-size:28px;
}

.topo-dashboard span{
    opacity:.8;
    font-size:14px;
}

.badge-status{
    background:#28a745;
    padding:8px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.cardsResumo{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-bottom:20px;
}

.resumo-card{
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.resumo-card div{
    font-size:30px;
    font-weight:bold;
    color:#1f4e79;
}

.resumo-card span{
    color:#666;
}

#scanner{
    width:100%;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    border:3px solid #1f4e79;
    border-radius:10px;
    margin-bottom:20px;
    text-align:center;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

#scanner:focus{
    outline:none;
    box-shadow:0 0 0 4px rgba(31,78,121,.2);
}

.barra{
    height:24px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.barra-preenchida{
    height:100%;
    width:0%;
    background:linear-gradient(
        90deg,
        #28a745,
        #49d66d
    );
    transition:.4s;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

thead{
    position:sticky;
    top:0;
    z-index:2;
}

th{
    background:#1f4e79;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
    color:#333;
}

tbody tr:hover{
    background:#eef5ff;
}


.ok{
    background:#d4edda;
}

.parcial{
    background:#fff3cd;
}

.faltando{
    background:#f8d7da;
}

.excedido{
    background:#ffb3b3;
}

input[type=file]{
    width:100%;
    padding:12px;
    border:2px dashed #1f4e79;
    border-radius:10px;
    background:#f8fbff;
    cursor:pointer;
}


</style>

</head>

<body>

<!-- MENU -->
<nav class="topo">
    <a href="config.html" class="btn-menu">⬅ Voltar</a>
    <a href="../../index.html" class="btn-menu">🏠 Início</a>
</nav>

<header class="topo-dashboard">

    <div>
        <h1>📦 Conferência de Entrada de Nota Fiscal TXT/XML</h1>
        <span>Compativel apenas com arquivos TXT • XML •</span>
    </div>

    <div class="badge-status">
        Sistema Online
    </div>

</header>

<div class="cardsResumo">

    <div class="resumo-card">
        <div id="totalItens">0</div>
        <span>Itens</span>
    </div>

    <div class="resumo-card">
        <div id="totalConferidos">0</div>
        <span>Conferidos</span>
    </div>

    <div class="resumo-card">
        <div id="percentual">0%</div>
        <span>Progresso</span>
    </div>

</div>

<div class="card">

    <h1>📂 Importar Nota</h1>

    <input
        type="file"
        id="txtNFe"
        accept=".txt,.xml">

</div>

<input
type="text"
id="scanner"
placeholder="🔍 Escaneie ou digite o código"
autofocus
disabled>

<div class="card">

    <div id="textoProgresso">
        Nenhuma nota carregada
    </div>

    <div class="barra">
        <div
            id="barraProgresso"
            class="barra-preenchida">
        </div>
    </div>

</div>

<table>
    <thead>
        <tr>
            <th>Código Interno</th>
            <th>Código EAN</th>
            <th>Produto</th>
            <th>Qtd Nota</th>
            <th>Escaneado</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="tabela"></tbody>
</table>

<audio id="bip" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

let nota = [];
let bip = document.getElementById("bip");
let input = document.getElementById("scanner");

/* ===== Atualiza tabela ===== */
function atualizarTela(){
    let tabela = "";
    let itensConferidos = 0;

    nota.forEach(p=>{
        let status = "", classe = "";

        if(p.qtdLida === 0){
            status = "❌ Faltando";
            classe = "faltando"; // vermelho
        } else if(p.qtdLida < p.qtdNota){
            status = "⚠ Parcial";
            classe = "parcial"; // amarelo
        } else if(p.qtdLida === p.qtdNota){
        status = "✔ Conferido";
        classe = "ok";
        itensConferidos++;
        } else {
        status = "🚨 Excedido";
        classe = "excedido"; // pode criar outra cor se quiser
        }

        tabela += `
        <tr class="${classe}">
            <td>${p.codigo}</td>
            <td>${p.ean}</td>
            <td>${p.nome}</td>
            <td>${p.qtdNota}</td>
            <td>${p.qtdLida}</td>
            <td>${status}</td>
        </tr>`;
    });

    document.getElementById("tabela").innerHTML = tabela;
    const percentual = nota.length > 0 ? Math.floor((itensConferidos / nota.length) * 100) : 0;
    
    document.getElementById("textoProgresso").innerText = `Itens conferidos: ${itensConferidos} / ${nota.length} (${percentual}%)`;

    document.getElementById("barraProgresso").style.width = percentual + "%";

    document.getElementById("totalItens").textContent = nota.length;
    
    document.getElementById("totalConferidos").textContent = itensConferidos;

    document.getElementById("percentual").textContent = percentual + "%";
    if(percentual === 100){

    document.querySelector(".badge-status")
    .innerHTML = "✅ Conferência Finalizada";

    }else{

    document.querySelector(".badge-status")
    .innerHTML = "Sistema Online";

}

}

/* ===== Lógica do scanner ===== */
input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        let codigo = input.value.trim();
        let produto = nota.find(p => p.ean === codigo || p.codigo === codigo);
        if(produto){
    produto.qtdLida++;

    if(produto.qtdLida > produto.qtdNota){
        bip.play();
        alert("⚠ Produto excedeu a quantidade da nota:\n\n" + produto.nome);
    }
    } else {

    bip.play();

    alert(
        "Código não encontrado:\n\n" +
        codigo
    );

    }
        input.value = "";
        atualizarTela();
        input.focus();
    }
});

/* ===== Carregar TXT contendo XML ===== */
document.getElementById('txtNFe').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(){
        const txtContent = reader.result;

        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(txtContent,"text/xml");

        const erro = xmlDoc.getElementsByTagName("parsererror");
        if(erro.length > 0){
        alert("Erro ao ler XML! Arquivo inválido.");
        return;
        }

        const dets = [...xmlDoc.getElementsByTagName("*")]
    .filter(el => el.localName === "det");

nota = [];

for(let i=0; i<dets.length; i++){

    const prod = Array.from(dets[i].children)
    .find(el => el.localName === "prod");

    if(!prod) continue;

    const get = (tag) => {
        const el = [...prod.getElementsByTagName("*")]
            .find(e => e.localName === tag);
        return el ? el.textContent : "";
    };

    const eanRaw = get("cEAN");
    const ean = (eanRaw === "SEM GTIN") ? "" : eanRaw.trim();

    const codigo = get("cProd");
    const nome = get("xProd") || "Produto";
    // 👉 DEBUG (ver no console)
    console.log(nome);
    const qtd = Number(get("qCom") || 0);

    let existente = null;

    const nomeLimpo = nome.trim().toUpperCase();

     if(ean){
    existente = nota.find(p => 
        p.ean === ean && p.nome === nomeLimpo
    );
    }

    if(existente){
        existente.qtdNota += qtd;
    } else {
        nota.push({
            codigo: codigo,
            ean: ean,
            nome: nome,
            qtdNota: qtd,
            qtdLida: 0
        });
    }
}

        input.disabled = false;
        input.focus();
        atualizarTela();
        alert("TXT/XML carregado! Todos os produtos da nota foram listados.");
    };
    reader.readAsText(file);
});

</script>


</body>
</html>
