<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sistema de Consignação de Livros</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
}

header{
background:#1f4e79;
color:#fff;
padding:15px 20px;
box-shadow:0 2px 5px rgba(0,0,0,.15);
}

.container{
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
font-size:28px;
color:#1f4e79;
margin-bottom:5px;
}

.section{
background:#fff;
margin-top:20px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.08);
}

.section h3{
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
font-size:14px;
}

th{
background:#f1f1f1;
}

button{
background:#1f4e79;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

input{
padding:8px;
width:100%;
border:1px solid #ccc;
border-radius:5px;
margin:5px 0;
}

/* =========================
   MODAL MELHORADO
========================= */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
z-index:999;
padding:20px;
overflow:auto;
}

.modal-content{
background:#fff;
width:95%;
max-width:1400px;
height:90vh;
margin:auto;
border-radius:12px;
padding:20px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.modal-topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.modal-topo h3{
margin:0;
}

#itensNota{
flex:1;
overflow:auto;
border:1px solid #ddd;
border-radius:8px;
padding:0 !important;
}


.tabela-itens{
min-width:1000px;
width:100%;
}

.col-titulo{
min-width:400px;
text-align:left;
}

.col-qtd{
width:120px;
text-align:center;
}

.col-acerto{
width:120px;
}

.col-acao{
width:140px;
}

.input-acerto{
width:80px;
text-align:center;
}

@media(max-width:768px){

.container{
padding:10px;
}

.card h3{
font-size:22px;
}

.modal-content{
width:100%;
height:95vh;
padding:10px;
}

}


.nota-header{
  margin:0;
  border-radius:0;
  background:#0d2f57 !important;
}
/* =========================
   NAVBAR DAS NFs (MELHORADO)
========================= */

.navbar-nf{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:0;
  padding:8px 10px;
  background:#0d2f57;
  border-radius:0;
  margin:0;
}

.navbar-nf button{
  background:transparent;
  border:1px solid rgba(255,255,255,0.35);
  color:#fff;
  cursor:pointer;
  transition:all .2s ease;

  padding:10px 18px;
  font-size:16px;
  font-weight:500;
  border-radius:0px; /* 👈 AQUI fica quadrado */
}

.navbar-nf button:hover{
  background:rgba(255,255,255,0.15);
  transform:translateY(-1px);
}

/* 🔵 BOTÃO ATIVO */
.navbar-nf button.ativo{
  background:#ffffff;
  color:#1f4e79;
  font-weight:bold;
}


</style>
</head>

<body>

<header>
<h2>📚 Sistema de Consignação de Livros</h2>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3 id="totalNotas">0</h3>
<p>Notas</p>
</div>

<div class="card">
<h3 id="totalItens">0</h3>
<p>Itens</p>
</div>

<div class="card">
<h3 id="totalAcertos">0</h3>
<p>Acertos</p>
</div>

</div>

<div class="section">

<h3>Importar XML</h3>

<input
type="file"
id="xmlFile"
accept=".xml">

<button onclick="importarXML()">
Importar XML
</button>

</div>

<div class="section">

<h3>Pesquisar Nota</h3>

<input
type="text"
id="busca"
placeholder="Número da nota">

<button onclick="carregarNotas()">
Pesquisar
</button>

</div>

<div class="section">

<h3>Notas</h3>

<table>

<thead>
<tr>
<th>NF</th>
<th>Fornecedor</th>
<th>Data</th>
<th>Valor</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="listaNotas"></tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<div class="modal-topo">

<h3>📚 Itens da Nota</h3>

<button onclick="fecharModal()">
✖ Fechar
</button>

</div>

<div id="itensNota"></div>

</div>

</div>

<div class="modal" id="modalHistorico">

<div class="modal-content">

<div class="modal-topo">

<h3>📜 Histórico do Livro</h3>

<button onclick="fecharHistorico()">
✖ Fechar
</button>

</div>

<div id="conteudoHistorico"></div>

</div>

</div>

<script>

const URL_API =
"https://script.google.com/macros/s/AKfycbwpk9GnsIpkCTHt5tDIb4bQI-nlmUbnp8s6iIJnIBT48Q63aHoLNx89EP_RGuOJxWwi7Q/exec";

async function carregarNotas(){

const resposta =
await fetch(
URL_API + "?acao=listarNotas"
);

const dados =
await resposta.json();

const tbody =
document.getElementById("listaNotas");

tbody.innerHTML="";

document.getElementById("totalNotas")
.textContent = dados.dados.length;

dados.dados.forEach(n=>{

tbody.innerHTML += `
<tr>

<td>${n[2]}</td>

<td>${n[3]}</td>

<td>${n[4]}</td>

<td>
R$ ${Number(n[5]).toFixed(2)}
</td>

<td>
<button onclick="abrirNota('${n[0]}')">
📖 Abrir
</button>
</td>

</tr>
`;

});

}
async function abrirNota(idNota){

  const resposta =
  await fetch(
    URL_API +
    "?acao=listarItens&idNota=" +
    idNota
  );

  const dados =
  await resposta.json();

  const div =
  document.getElementById("itensNota");

  let conteudo = "";

  // =========================
  // BLOCO SUPERIOR (ASSOCIAÇÃO + XML)
  // =========================

  conteudo += `
    <div style="
      background:#f5f5f5;
      padding:15px;
      margin-bottom:15px;
      border-radius:8px;
    ">

      <h3>📦 Notas Associadas</h3>

      <div id="listaAssociadas">
        Carregando...
      </div>

      <br>

      <select id="notaAssociar">
        <option value="">Selecione uma nota</option>
      </select>

      <button onclick="associarNota('${idNota}')">
        ➕ Associar Nota
      </button>

      <br><br>

      <input type="file" id="xmlAssociado" accept=".xml">

      <button onclick="importarXmlAssociado('${idNota}')">
        📥 Importar XML e Associar
      </button>

    </div>
  `;

  // =========================
  // 🔵 NAVBAR ÚNICO (CORRIGIDO)
  // =========================

  conteudo += `
    <div class="navbar-nf" id="navbarNF">
      ${dados.notas.map(n => {
        const nid = n.idNota || n.numeroNF;

        return `
          <button
            id="btn_${nid}"
            onclick="mostrarNota('${nid}')"
          >
            NF ${n.numeroNF}
          </button>
        `;
      }).join("")}
    </div>
  `;

  // =========================
  // NOTAS (BLOCOS)
  // =========================

  dados.notas.forEach((nota, index) => {

    const id = nota.idNota || nota.numeroNF;

    conteudo += `
      <div
        class="nota-bloco"
        id="nota_${id}"
        style="
          display:${index === 0 ? "block" : "none"};
          margin:0;
          border:2px solid #1f4e79;
          border-radius:0;
          overflow:hidden;
        "
      >

        <!-- HEADER DA NF -->
        <div style="
          background:#1f4e79;
          color:white;
          padding:12px;
          font-size:16px;
          font-weight:bold;
          border-radius:0;
          margin:0;
        ">

          📦 NF ${nota.numeroNF}
          &nbsp;&nbsp;|&nbsp;&nbsp;
          🏢 ${nota.fornecedor}
          &nbsp;&nbsp;|&nbsp;&nbsp;
          📅 ${formatarDataISO(nota.data)}
          &nbsp;&nbsp;|&nbsp;&nbsp;
          💰 R$ ${Number(nota.valor).toFixed(2)}

        </div>

        <!-- TABELA -->
        <div style="overflow:auto;">
          <table class="tabela-itens">

            <thead>
              <tr>
                <th>ISBN</th>
                <th>Título</th>
                <th>Recebido</th>
                <th>Acertado</th>
                <th>Saldo</th>
                <th>Acerto</th>
                <th>Ações</th>
              </tr>
            </thead>

            <tbody>
    `;

    nota.itens.forEach(item => {

      conteudo += `
        <tr>

          <td>${item.isbn}</td>

          <td class="col-titulo">
            ${item.titulo}
          </td>

          <td style="text-align:center;">
            ${item.recebido}
          </td>

          <td style="text-align:center;">
            ${item.acertado}
          </td>

          <td style="
            text-align:center;
            font-weight:bold;
            color:${item.saldo > 0 ? "#0f7b0f" : "#c62828"};
          ">
            ${item.saldo}
          </td>

          <td>
            <input
              type="number"
              min="1"
              max="${item.saldo}"
              value="0"
              id="qtd_${item.idItem}"
              class="input-acerto"
              ${item.saldo <= 0 ? "disabled" : ""}
            >
          </td>

          <td>
            <button onclick="acertar('${item.idItem}')">
              💾 Salvar
            </button>

            <br><br>

            <button onclick="abrirHistorico('${item.idItem}')">
              📜 Histórico
            </button>
          </td>

        </tr>
      `;
    });

    conteudo += `
            </tbody>
          </table>
        </div>

      </div>
    `;
  });

  div.innerHTML = conteudo;

  // =========================
  // CARREGAMENTOS EXTRAS
  // =========================

  carregarNotasAssociacao(idNota);
  carregarAssociadas(idNota);

  // ativa primeira NF automaticamente
  const primeiroId = dados.notas[0]?.idNota || dados.notas[0]?.numeroNF;

  if(primeiroId){
    setTimeout(() => {
      mostrarNota(primeiroId);

      const btn = document.getElementById("btn_" + primeiroId);
      if(btn) btn.classList.add("ativo");
    }, 50);
  }

  document.getElementById("modal").style.display = "block";
}

function mostrarNota(id){

  const blocos = document.querySelectorAll(".nota-bloco");
  const botoes = document.querySelectorAll(".navbar-nf button");

  // esconde tudo imediatamente
  blocos.forEach(b => {
    b.style.display = "none";
  });

  // remove ativo dos botões
  botoes.forEach(b => b.classList.remove("ativo"));

  // mostra o selecionado
  const alvo = document.getElementById("nota_" + id);

  if(alvo){
    alvo.style.display = "block";
  }

  // ativa botão correspondente
  const btnAtivo = document.getElementById("btn_" + id);

  if(btnAtivo){
    btnAtivo.classList.add("ativo");
  }
}

function fecharModal(){

document.getElementById("modal")
.style.display="none";

}

async function acertar(idItem){

const campo =
document.getElementById(
"qtd_" + idItem
);

const quantidade =
Number(campo.value);

const saldo =
Number(
campo.dataset.saldo
);

if(quantidade <= 0){

alert(
"Informe uma quantidade válida."
);

return;

}

if(quantidade > saldo){

alert(
"Quantidade maior que o saldo disponível (" +
saldo +
")."
);

campo.focus();

return;

}

const resposta = await fetch(
URL_API,
{
method:"POST",
body:JSON.stringify({
acao:"acertoLivro",
idItem:idItem,
quantidade:quantidade,
tipo:"ACERTO"
})
}
);

const dados =
await resposta.json();

alert(dados.mensagem);

if(dados.sucesso){

const modal =
document.getElementById("modal");

modal.style.display="none";

setTimeout(()=>{
modal.style.display="block";
},100);

}

}

function importarXML(){

const arquivo =
document.getElementById("xmlFile")
.files[0];

if(!arquivo){

alert("Selecione um XML.");

return;

}

const leitor =
new FileReader();

leitor.onload =
async function(e){

const xml =
e.target.result;

const resposta =
await fetch(URL_API,{

method:"POST",

body:JSON.stringify({

acao:"importarXML",

xml:xml

})

});

const dados =
await resposta.json();

alert(
dados.mensagem ||
"Importado"
);

carregarNotas();

};

leitor.readAsText(arquivo);

}

async function abrirHistorico(idItem){

const resposta =
await fetch(
URL_API +
"?acao=historicoItem&idItem=" +
idItem
);

const dados =
await resposta.json();

if(!dados.sucesso){

alert(dados.mensagem);

return;

}

let html = `

<h2>${dados.item.titulo}</h2>

<br>

<p><b>ISBN:</b> ${dados.item.isbn}</p>

<p><b>Recebido:</b> ${dados.item.recebido}</p>

<p><b>Acertado:</b> ${dados.item.acertado}</p>

<p><b>Saldo:</b> ${dados.item.saldo}</p>

<br>

<table>

<thead>
<tr>
<th>Data</th>
<th>Tipo</th>
<th>Quantidade</th>
</tr>
</thead>

<tbody>
`;

dados.historico.forEach(h=>{

html += `
<tr>

<td>${h.data}</td>

<td>${h.tipo}</td>

<td>${h.quantidade}</td>

</tr>
`;

});

html += `
</tbody>
</table>
`;

document.getElementById(
"conteudoHistorico"
).innerHTML = html;

document.getElementById(
"modalHistorico"
).style.display = "block";

}

function fecharHistorico(){

document.getElementById(
"modalHistorico"
).style.display = "none";

}


async function carregarNotasAssociacao(idNota){

const resposta =
await fetch(
URL_API +
"?acao=notasDisponiveis&idNota=" +
idNota
);

const dados =
await resposta.json();

const select =
document.getElementById(
"notaAssociar"
);

select.innerHTML =
'<option value="">Selecione</option>';

dados.notas.forEach(n=>{

select.innerHTML += `
<option value="${n.id}">
NF ${n.numero}
</option>
`;

});

}

async function associarNota(idPrincipal){

const idAssociada =
document.getElementById(
"notaAssociar"
).value;

if(!idAssociada){

alert("Selecione uma nota");
return;

}

const resposta =
await fetch(URL_API,{

method:"POST",

body:JSON.stringify({

acao:"associarNota",

idPrincipal,
idAssociada

})

});

const dados =
await resposta.json();

alert(dados.mensagem);

abrirNota(idPrincipal);

}

async function carregarAssociadas(idNota){

const resposta =
await fetch(
URL_API +
"?acao=listarAssociadas&idNota=" +
idNota
);

const dados =
await resposta.json();

const div =
document.getElementById("listaAssociadas");

let html = `
<div style="
display:flex;
flex-wrap:wrap;
gap:8px;
max-width:100%;
">
`;

dados.notas.forEach(n=>{

html += `
<div style="
padding:8px;
margin:0;
background:#fff;
border:1px solid #ddd;
display:flex;
align-items:center;
gap:6px;
border-radius:6px;
">

📄 NF ${n.numero}

<button
onclick="removerAssociada(
'${idNota}',
'${n.id}'
)">
❌
</button>

</div>
`;

});

html += `</div>`;

div.innerHTML = html;

}

async function removerAssociada(
idPrincipal,
idAssociada
){

const confirmar =
confirm(
"Deseja remover esta associação?"
);

if(!confirmar)
return;

const resposta =
await fetch(URL_API,{

method:"POST",

body:JSON.stringify({

acao:"removerAssociada",

idPrincipal,

idAssociada

})

});

const dados =
await resposta.json();

alert(dados.mensagem);

if(dados.sucesso){

carregarAssociadas(idPrincipal);

abrirNota(idPrincipal);

}

}

function formatarDataISO(dataISO){

if(!dataISO) return "";

const d = new Date(dataISO);

return d.toLocaleDateString("pt-BR") + " " +
d.toLocaleTimeString("pt-BR", {
  hour: "2-digit",
  minute: "2-digit"
});

}

async function importarXmlAssociado(idPrincipal){

const arquivo =
document.getElementById(
"xmlAssociado"
).files[0];

if(!arquivo){

alert("Selecione XML");
return;

}

const leitor =
new FileReader();

leitor.onload =
async function(e){

const xml =
e.target.result;

const resposta =
await fetch(URL_API,{

method:"POST",

body:JSON.stringify({

acao:"importarXmlAssociado",

idPrincipal,
xml

})

});

const dados =
await resposta.json();

alert(dados.mensagem);

abrirNota(idPrincipal);

};

leitor.readAsText(arquivo);

}


window.onclick = function(e){

if(
e.target ==
document.getElementById("modal")
){

fecharModal();

}

if(
e.target ==
document.getElementById("modalHistorico")
){

fecharHistorico();

}

};

carregarNotas();

</script>

</body>
</html>
