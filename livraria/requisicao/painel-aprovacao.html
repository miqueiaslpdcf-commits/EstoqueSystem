<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Aprovação</title>

<style>
body{
    font-family:Arial;
    background:#eef1f5;
    padding:20px;
}

.box{
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

h2{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th, td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

button{
    padding:5px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}


.aprovar{background:#28a745;color:#fff;}
.negar{background:#dc3545;color:#fff;}
.editar{background:#007bff;color:#fff;}

.box{
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    position:relative; /* ESSENCIAL */
}

/* botão X no canto */
.fechar{
    position:absolute;
    top:10px;
    right:10px;

    width:32px;
    height:32px;

    border-radius:50%;
    border:none;

    cursor:pointer;

    background: radial-gradient(circle at 30% 30%, #ff6b6b, #d60000);
    color:#fff;

    font-size:18px;
    font-weight:bold;

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:0 4px 10px rgba(0,0,0,0.2);

    transition:0.2s ease;
}

.fechar:hover{
    transform: scale(1.1);
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
}

.fechar:active{
    transform: scale(0.9);
}



@keyframes pop{
    from{transform:scale(0.8); opacity:0;}
    to{transform:scale(1); opacity:1;}
}



/* 🔥 BOTÃO IMPORTAR */
.btn-importar{
    background: linear-gradient(135deg, #4facfe, #00c6ff);
    color: #fff;
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.3s;
}

.btn-importar:hover{
    transform: scale(1.05);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* 🔽 MENU */
.menu-importar{
    display:none;
    margin-top:10px;
    padding:10px;
    background:#f1f3f6;
    border-radius:10px;
    flex-wrap:wrap;
    gap:10px;
    position:relative;
    z-index:10;
}


/* BOTÕES */
.menu-importar button{
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    transition:0.2s;
    color:#fff;
}

.btn-pdf{
    background:linear-gradient(135deg,#cb2d3e,#ef473a);
}

.btn-txt{
    background:#6c757d;
}

.btn-csv{
    background:#27ae60;
}

.btn-word{
    background:#2b579a;
}

.menu-importar button:hover{
    transform:translateY(-2px);
    opacity:0.9;
}



</style>
</head>

<body>

<h2>📊 Painel de Aprovação de Requisições</h2>
<div style="margin-bottom:20px;">
    <button onclick="abrirModalImportacaoGeral()" class="btn-importar" style="font-size:14px; padding:10px 18px;">
        📦 Importação Avulsa
    </button>
</div>

<div id="lista"></div>


<!-- MODAL DE CONFIRMAÇÃO -->
<div id="modalExcluir" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:99999;
">

    <div style="
        background:#fff;
        padding:25px;
        border-radius:12px;
        width:320px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
        animation:pop 0.2s ease;
    ">

        <h3 style="margin-bottom:10px;">🗑️ Excluir requisição?</h3>
        <p style="color:#555; font-size:14px;">
            Essa ação não pode ser desfeita.
        </p>

        <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <button onclick="fecharModal()" style="
                background:#ccc;
                color:#000;
                padding:8px 12px;
                border-radius:8px;
            ">
                Cancelar
            </button>

            <button id="btnConfirmarExcluir" style="
                background:linear-gradient(135deg,#ff4d4d,#b30000);
                color:#fff;
                padding:8px 12px;
                border-radius:8px;
            ">
                Sim, excluir
            </button>
        </div>
    </div>
</div>

<!-- MODAL EXPORTAÇÃO -->
<div id="modalExportacao" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:99999;
">

    <div style="
        background:#fff;
        padding:25px;
        border-radius:12px;
        width:340px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
        animation:pop 0.2s ease;
    ">

        <h3 style="margin-bottom:15px;">
            📊 Exportar Planilha
        </h3>

        <p style="color:#555;font-size:14px;margin-bottom:20px;">
            Escolha o formato:
        </p>

        <div style="
            display:flex;
            flex-direction:column;
            gap:10px;
        ">

            <button onclick="exportarCSV(modalReqId)" style="
                background:#27ae60;
                color:#fff;
                padding:10px;
                border-radius:8px;
            ">
                📄 CSV
            </button>

            <button onclick="exportarXLSX(modalReqId)" style="
                background:#1d6f42;
                color:#fff;
                padding:10px;
                border-radius:8px;
            ">
                📗 XLSX
            </button>

            <button onclick="abrirGooglePlanilhas(modalReqId)" style="
                background:#4285F4;
                color:#fff;
                padding:10px;
                border-radius:8px;
            ">
                ☁️ Google Planilhas
            </button>

            <button onclick="fecharModalExportacao()" style="
                background:#ccc;
                color:#000;
                padding:10px;
                border-radius:8px;
                margin-top:5px;
            ">
                Cancelar
            </button>

        </div>

    </div>
</div>

<!-- 🔥 MODAL IMPORTAÇÃO GERAL -->
<div id="modalImportacaoGeral" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:999999;
">

    <div style="
        background:#fff;
        width:420px;
        max-height:85vh;
        overflow:auto;
        border-radius:16px;
        padding:25px;
        font-family:Arial;
        animation:pop .2s ease;
    ">

        <h2 style="margin-top:0;">
            📦 Importação Avulsa
        </h2>

        <p style="color:#666; font-size:14px;">
            Escolha as requisições que deseja exportar.
        </p>

        <div style="margin:15px 0;">
            <button onclick="selecionarTodasReq()" class="btn-importar">
                ✅ Selecionar Todas
            </button>

            <button onclick="limparSelecaoReq()" style="
                background:#eee;
                color:#000;
                margin-left:10px;
            ">
                ❌ Limpar
            </button>
        </div>

        <div id="listaCheckboxReq" style="
            max-height:300px;
            overflow:auto;
            border:1px solid #ddd;
            border-radius:10px;
            padding:10px;
            margin-bottom:20px;
        ">
        </div>

        <div style="display:flex; gap:10px;">

            <button onclick="exportarGeralPDF()" class="btn-pdf" style="flex:1;">
                📄 PDF
            </button>

            <button onclick="exportarGeralExcel()" class="btn-csv" style="flex:1;">
                📊 Excel
            </button>

        </div>

        <button onclick="fecharModalImportacaoGeral()" style="
            margin-top:12px;
            width:100%;
            background:#ccc;
            color:#000;
            padding:10px;
            border-radius:8px;
        ">
            Fechar
        </button>

    </div>
</div>


<script>
const API = "https://script.google.com/macros/s/AKfycbx0aeVxAFA99AEvHwuqpGqTMGh2RKTJ7mIS6fm5fe4LPTL8XbmehxCVnLPfAXla716y7Q/exec";
const tipo = localStorage.getItem("tipoUsuario");

let filaAtualizacao = {};
let timerEnvio = null;

if(tipo !== "compradora"){
    alert("Acesso permitido apenas para compradora!");
    window.location.href = "login.html";
}

let mapaReq = {};

async function carregar(){
    const lista = document.getElementById("lista");

    try{
        const res = await fetch(API);
        const texto = await res.text();

        console.log("RESPOSTA API:", texto);

        let requisicoes;

        try{
            requisicoes = JSON.parse(texto);
        }catch(e){
            throw new Error("Resposta não é JSON válido");
        }

        if(!Array.isArray(requisicoes)){
            throw new Error("Formato inválido da API");
        }

        if(requisicoes.length === 0){
            lista.innerHTML = "Nenhuma requisição encontrada.";
            return;
        }

        let htmlFinal = "";

        requisicoes.forEach((req) => {

            let itens = [];

            try{
                itens = JSON.parse(req.itens);
                mapaReq[String(req.id)] = itens;
            }catch(e){
                itens = [];
            }

            let html = `
            <div class="box" data-id="${req.id}">
            <button class="fechar" onclick="excluirRequisicao(${req.id}, ${req.linha})">×</button>
           
            <h4 style="display:flex;align-items:center;gap:10px;padding-right:50px;">
        <span>📦 Requisição #${req.id}</span>
    <button class="btn-importar" onclick="abrirMenu(${req.id})">📥 Importar</button>
    </h4>

<div id="menu-${req.id}" class="menu-importar">

    <button class="btn-pdf" onclick="exportarPDF(${req.id})">
        📄 PDF
    </button>

    <button class="btn-txt" onclick="exportarTXT(${req.id})">
        📝 TXT
    </button>

    <button class="btn-csv" onclick="abrirModalExportacao(${req.id})">
    📊 PLANILHA </button>

    <button class="btn-word" onclick="exportarWord(${req.id})">
        📘 WORD
    </button>

</div>

                <p>👤 Livreiro: <b>${req.usuario}</b></p>

                <p>Status: 
                    <b class="status" style="color:${
                        req.status === 'Aprovado' ? 'green' : 
                        req.status === 'Negado' ? 'red' : 'orange'
                    }">
                        ${req.status}
                    </b>
                </p>

                <p class="data-req">📅 ${formatarData(req.data)}</p>

                <table>
                    <tr>
                        <th>Livro</th>
                        <th>Qtd</th>
                        <th>Preço</th>
                        <th>Subtotal</th>
                    </tr>
            `;

            let total = 0;

            itens.forEach((item, index) => {

                const preco = parseFloat(item.preco?.toString().replace(",", ".")) || 0;
                const subtotal = preco * item.qtd;
                total += subtotal;

                html += `
                <tr>
                    <td>${item.nome}</td>

                    <td>
                        ${
                            req.status === "Pendente"
                            ? `
                                <button onclick="diminuir(${req.linha}, ${index}, this)">-</button>
                                <span class="qtd">${item.qtd}</span>
                                <button onclick="aumentar(${req.linha}, ${index}, this)">+</button>
                            `
                            : `<span class="qtd">${item.qtd}</span>`
                        }
                    </td>

                    <td>R$ ${preco.toFixed(2)}</td>

                    <td class="subtotal">
                        R$ ${subtotal.toFixed(2)}
                    </td>
                </tr>
                `;
            });

            // TOTAL
            html += `
                <tr>
                    <td colspan="3" style="text-align:right; font-weight:bold; background:#f5f5f5;">
                        💰 TOTAL
                    </td>
                    <td style="font-weight:bold; color:green;">
                        <span id="total-${req.id}">R$ ${total.toFixed(2)}</span>
                    </td>
                </tr>
            `;

            html += `</table>`;

            // 🔥 BOTÕES APROVAR / NEGAR (CORRETO AGORA)
            if(req.status === "Pendente"){
                html += `
                <div style="margin-top:10px; display:flex; gap:10px; justify-content:center;">
                    <button class="aprovar" onclick="aprovar(${req.id}, ${req.linha})">
                        ✅ Aprovar
                    </button>

                    <button class="negar" onclick="negar(${req.id}, ${req.linha})">
                        ❌ Negar
                    </button>
                </div>
                `;
            }

            html += `</div>`;

            htmlFinal += html;
        });

        lista.innerHTML = htmlFinal;

    }catch(e){
        console.error("ERRO REAL:", e);
        lista.innerHTML = "❌ Erro ao carregar dados";
    }
}

// 💾 Salvar alterações
function salvar(reqs){
    localStorage.setItem("requisicoes", JSON.stringify(reqs));
}

// ✅ Aprovar
function aprovar(id, linha){
    const box = document.querySelector(`.box[data-id="${id}"]`);
    if(!box) return;

    if(box.dataset.processando) return;
    box.dataset.processando = true;

    atualizarStatusLocal(id, "Aprovado");

    fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "dados=" + encodeURIComponent(JSON.stringify({
        tipo:"atualizar_status",
        linha: linha,
        status:"Aprovado"
        }))
    })
    .then(r => r.text())
    .then(() => {
        // 🔥 só recarrega DEPOIS que salvou
        setTimeout(carregar, 300);
    })
    .catch(err => console.error("ERRO:", err));
}

// ❌ Negar
function negar(id, linha){
    const box = document.querySelector(`.box[data-id="${id}"]`);
    if(!box) return;

    if(box.dataset.processando) return;
    box.dataset.processando = true;

    atualizarStatusLocal(id, "Negado");

    fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "dados=" + encodeURIComponent(JSON.stringify({
            tipo:"atualizar_status",
            linha: linha,
            status:"Negado"
        }))
    })
    .then(r => r.text())
    .then(() => {
        setTimeout(carregar, 300);
    })
    .catch(err => console.error("ERRO:", err));
}


function atualizarStatusLocal(id, novoStatus){
    const box = document.querySelector(`.box[data-id="${id}"]`);

    if(!box) return;

    const statusEl = box.querySelector(".status");

    if(statusEl){
        statusEl.innerText = novoStatus;

        const cor = 
            novoStatus === "Aprovado" ? "green" :
            novoStatus === "Negado" ? "red" : "orange";

        statusEl.style.color = cor;
    }

    // 🔥 REMOVE OS BOTÕES (IMPOSSÍVEL CLICAR DE NOVO)
    box.querySelectorAll(".aprovar, .negar").forEach(btn => btn.remove());
}

// ➕ Aumentar qtd
function aumentar(linha, index, el){
    const box = el.closest(".box");
    const status = box.querySelector(".status").innerText;

    if(status !== "Pendente") return;

    const td = el.parentElement;
    const span = td.querySelector(".qtd");

    let qtd = parseInt(span.innerText);
    qtd++;
    span.innerText = qtd;

    atualizarValoresLinha(td, qtd);

    const chave = `${linha}-${index}`;
    if(!filaAtualizacao[chave]) filaAtualizacao[chave] = 0;
    filaAtualizacao[chave]++;

    agendarEnvio();
}

// ➖ Diminuir qtd
function diminuir(linha, index, el){
    const box = el.closest(".box");
    const status = box.querySelector(".status").innerText;

    if(status !== "Pendente") return;

    const td = el.parentElement;
    const span = td.querySelector(".qtd");

    let qtd = parseInt(span.innerText);

    if(qtd > 1){
        qtd--;
        span.innerText = qtd;

        atualizarValoresLinha(td, qtd);

        const chave = `${linha}-${index}`;
        if(!filaAtualizacao[chave]) filaAtualizacao[chave] = 0;
        filaAtualizacao[chave]--;

        agendarEnvio();
    }
}

function agendarEnvio(){
    if(timerEnvio) clearTimeout(timerEnvio);

    timerEnvio = setTimeout(enviarFila, 500); // espera o usuário parar de clicar
}

function enviarFila(){
    const dadosEnvio = [];

    for(let chave in filaAtualizacao){
        const [linha, index] = chave.split("-");
        const valor = filaAtualizacao[chave];

        if(valor !== 0){
            dadosEnvio.push({
                linha: Number(linha),
                index: Number(index),
                valor: valor
            });
        }
    }

    // limpa fila
    filaAtualizacao = {};

    if(dadosEnvio.length === 0) return;

    fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "dados=" + encodeURIComponent(JSON.stringify({
            tipo: "editar_qtd_lote",
            alteracoes: dadosEnvio
        }))
    })
    .then(r => r.text())
    .then(res => {
        console.log("Atualização em lote enviada");
    })
    .catch(err => console.error("ERRO:", err));
}

// ❌ Remover item
function removerItem(r,i){
    let reqs = JSON.parse(localStorage.getItem("requisicoes"));
    reqs[r].itens.splice(i,1);
    salvar(reqs);
    carregar();
}

function atualizarValoresLinha(td, qtd){
    const tr = td.parentElement;
    const precoText = tr.children[2].innerText;

    const preco = parseFloat(
    precoText
    .replace("R$", "")
    .replace(",", ".")
    .trim()) || 0;

    const subtotalCell = tr.querySelector(".subtotal");
    const novoSubtotal = preco * qtd;

    subtotalCell.innerText = "R$ " + novoSubtotal.toFixed(2);

    atualizarTotal(tr.closest(".box"));
}
function atualizarTotal(box){
    let total = 0;

    box.querySelectorAll(".subtotal").forEach(cell => {
        const valor = parseFloat(
            cell.innerText.replace("R$", "").trim()
        ) || 0;

        total += valor;
    });

    const totalEl = box.querySelector("[id^='total-']");
    if(totalEl){
        totalEl.innerText = "R$ " + total.toFixed(2);
    }
}

let requisicaoParaExcluir = null;

function excluirRequisicao(id, linha){

    requisicaoParaExcluir = {id, linha};

    document.getElementById("modalExcluir").style.display = "flex";

    const btn = document.getElementById("btnConfirmarExcluir");

    btn.onclick = confirmarExclusao;
}

function fecharModal(){
    document.getElementById("modalExcluir").style.display = "none";
    requisicaoParaExcluir = null;
}

function confirmarExclusao(){

    if(!requisicaoParaExcluir) return;

    const {id} = requisicaoParaExcluir;

    // 🔥 REMOVE IMEDIATAMENTE DO FRONT
    const box = document.querySelector(`.box[data-id="${id}"]`);

    if(box){
        box.style.transition = "0.25s ease";
        box.style.opacity = "0";
        box.style.transform = "scale(0.9)";

        setTimeout(() => {
            box.remove();
        }, 250);
    }

    fecharModal();

    // 🔥 ENVIA PARA API EM SEGUNDO PLANO
    fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "dados=" + encodeURIComponent(JSON.stringify({
            tipo: "excluir_requisicao",
            id: id
        }))
    })
    .then(r => r.json())
    .then(res => {

        console.log("RESPOSTA:", res);

        if(res.status !== "ok"){
            alert("Erro ao excluir na planilha");
            carregar();
        }

    })
    .catch(err => {
        console.error("ERRO:", err);
        carregar();
    });
}


function abrirMenu(id){

    const menu = document.getElementById("menu-" + id);

    const aberto = menu.style.display === "flex";

    document
    .querySelectorAll("[id^='menu-']")
    .forEach(m => m.style.display = "none");

    menu.style.display = aberto ? "none" : "flex";
}

document.addEventListener("click", function(e){

    if(
        !e.target.closest(".menu-importar") &&
        !e.target.closest(".btn-importar")
    ){
        document
        .querySelectorAll("[id^='menu-']")
        .forEach(m => m.style.display = "none");
    }
});
function exportarTXT(id){

    const itens = mapaReq[id] || [];

    let total = 0;

    let texto = "";

    texto += "=====================================\n";
    texto += "REQUISIÇÃO #" + id + "\n";
    texto += "=====================================\n\n";

    itens.forEach((i,index)=>{

        const preco = parseFloat(
            i.preco?.toString().replace(",", ".")
        ) || 0;

        const subtotal = preco * i.qtd;

        total += subtotal;

        texto += `${index+1}. ${i.nome}\n`;
        texto += `Qtd: ${i.qtd} | R$ ${preco.toFixed(2)}\n`;
        texto += `Subtotal: R$ ${subtotal.toFixed(2)}\n\n`;
    });

    texto += `TOTAL: R$ ${total.toFixed(2)}`;

    baixarArquivo(
        texto,
        `requisicao_${id}.txt`,
        "text/plain"
    );
}
function exportarCSV(id){

    const itens = mapaReq[id] || [];

    let csv = "Item;EAN;Nome;Qtd;Preço;Subtotal\n";

    let total = 0;

    itens.forEach((i,index)=>{

        const preco = parseFloat(
            i.preco?.toString().replace(",", ".")
        ) || 0;

        const subtotal = preco * i.qtd;

        total += subtotal;

        csv += `${index+1};"${String(i.ean || "").replace(/-/g, "")}";"${i.nome}";${i.qtd};${preco.toFixed(2)};${subtotal.toFixed(2)}\n`;
    });

    csv += `;;;;;\n`;
    csv += `;;;;TOTAL;${total.toFixed(2)}\n`;

    const blob = new Blob(
        ["\uFEFF" + csv],
        {type:"text/csv;charset=utf-8;"}
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = `requisicao_${id}.csv`;

    link.click();

    fecharModalExportacao();
}

function exportarWord(id){

    const itens = mapaReq[id] || [];

    let total = 0;

    let html = `
    <h2>Requisição #${id}</h2>

    <table border="1" style="border-collapse:collapse;width:100%;">
    <tr>
        <th>Item</th>
        <th>Livro</th>
        <th>Qtd</th>
        <th>Preço</th>
        <th>Subtotal</th>
    </tr>
    `;

    itens.forEach((i,index)=>{

        const preco = parseFloat(
            i.preco?.toString().replace(",", ".")
        ) || 0;

        const subtotal = preco * i.qtd;

        total += subtotal;

        html += `
        <tr>
            <td>${index+1}</td>
            <td>${i.nome}</td>
            <td>${i.qtd}</td>
            <td>R$ ${preco.toFixed(2)}</td>
            <td>R$ ${subtotal.toFixed(2)}</td>
        </tr>
        `;
    });

    html += `
    </table>

    <h3>Total: R$ ${total.toFixed(2)}</h3>
    `;

    baixarArquivo(
        html,
        `requisicao_${id}.doc`,
        "application/msword"
    );
}

function exportarPDF(id){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    const itens = mapaReq[id] || [];

    let y = 10;

    let total = 0;

    doc.setFontSize(14);

    doc.text("Requisição #" + id, 10, y);

    y += 10;

    itens.forEach((i,index)=>{

        const preco = parseFloat(
            i.preco?.toString().replace(",", ".")
        ) || 0;

        const subtotal = preco * i.qtd;

        total += subtotal;

        const texto =
        `${index+1}. ${i.nome} | Qtd: ${i.qtd} | R$ ${preco.toFixed(2)} | Subtotal: R$ ${subtotal.toFixed(2)}`;

        const linhas = doc.splitTextToSize(texto, 180);

        doc.text(linhas, 10, y);

        y += linhas.length * 6;

        if(y > 270){
            doc.addPage();
            y = 10;
        }
    });

    y += 10;

    doc.text(
        `TOTAL: R$ ${total.toFixed(2)}`,
        10,
        y
    );

    doc.save(`requisicao_${id}.pdf`);
}

function baixarArquivo(conteudo, nome, tipo){

    const blob = new Blob(
        [conteudo],
        {type:tipo}
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = nome;

    link.click();
}

async function abrirGooglePlanilhas(id){

    const itens = mapaReq[id] || [];

    try{

        const res = await fetch(API, {
            method:"POST",
            headers:{
                "Content-Type":
                "application/x-www-form-urlencoded"
            },
            body:
            "dados=" +
            encodeURIComponent(
                JSON.stringify({
                    tipo:"criar_planilha",
                    id:id,
                    itens:itens
                })
            )
        });

        const json = await res.json();

        if(json.status === "ok"){

            window.open(
                json.url,
                "_blank"
            );

        }else{

            alert("Erro ao criar planilha");

        }

    }catch(err){

        console.error(err);

        alert("Erro ao conectar com API");

    }

    fecharModalExportacao();
}

function formatarData(dataISO){

    if(!dataISO) return "";

    const data = new Date(dataISO);

    return data.toLocaleString("pt-BR", {
        timeZone: "America/Sao_Paulo"
    });
}
